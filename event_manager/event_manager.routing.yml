event_manager.form:
  path: '/event/register'
  defaults:
    _form: '\Drupal\event_manager\Form\EventRegistrationForm'
    _title: 'Event Registration'
  requirements:
    _permission: 'access content'

event_manager.list:
  path: '/events'
  defaults:
    _controller: '\Drupal\event_manager\Controller\EventController::list'
    _title: 'Events'
  requirements:
    _permission: 'access content'

event_manager.admin:
  path: '/admin/event-registrations'
  defaults:
    _controller: '\Drupal\event_manager\Controller\EventController::list'
    _title: 'Event Registrations'
  requirements:
    _permission: 'access administration pages'
